name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile
        run: |
          python -m py_compile \
            app.py data_processor.py screenshot_reader.py insights.py \
            preview.py profiles.py slide_builder.py slide_preview.py tests/run_all.py

      - name: Self-test
        run: python -m tests.run_all
