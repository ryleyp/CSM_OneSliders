# ea-slide-builder runs FULLY OFFLINE / local-only.
# This config hard-disables Streamlit's usage telemetry so nothing phones home.

[browser]
# Do NOT send anonymous usage statistics to Streamlit/Segment.
gatherUsageStats = false

[server]
# PRIVATE by default: bind to localhost only, so the app is reachable ONLY on
# this machine (http://localhost:8501). Nothing on your network or the internet
# can open it — important when entering contract data.
#
# To deliberately let teammates on your LAN reach it (NOT recommended for
# sensitive contract data), launch with: --server.address=0.0.0.0
address = "127.0.0.1"
port = 8501
headless = true

[global]
# No "show warning on direct execution" prompts, etc.
developmentMode = false
